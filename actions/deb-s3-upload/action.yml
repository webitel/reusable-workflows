name: Upload Debian Package to S3-backed APT Repository
description: >
  Uploads a Debian package to an S3-backed APT repository using deb-s3.
  Supports GPG signing and custom codename/component settings.

inputs:
  s3-secret-id:
    required: true
    description: Access key ID used for authentication to S3

  s3-secret-key:
    required: true
    description: Secret access key used for authentication to S3

  s3-bucket-region:
    required: false
    description: Region where the S3 bucket is located (e.g., us-east-1)

  s3-endpoint:
    required: false
    description: Endpoint URL for S3 (optional)

  s3-force-path-style:
    required: false
    description: Force path style URLs (optional)

  s3-bucket-name:
    required: true
    description: Name of the S3 bucket where the package will be uploaded

  source:
    required: true
    description: Build artifact (e.g., .deb package) that will be uploaded to the S3 bucket

  codename:
    required: true
    description: Codename of the APT repository

  arch:
    required: false
    default: amd64
    description: Package architecture (e.g., amd64, arm64)

  component:
    required: true
    description: Component of the APT repository

  gpg-private-key:
    required: true
    description: Base64-encoded GPG private key used for signing

  gpg-passphrase:
    required: true
    description: Passphrase for the GPG private key

  github-app-id:
    required: false
    description: |
      Numeric ID of the GitHub App used to generate the installation token.
      This is required when downloading artifacts from a different repository or from a different workflow run

  github-app-private-key:
    required: false
    description: |
      PEM-encoded private key for the GitHub App.
      This is required when downloading artifacts from a different repository or from a different workflow run

  artifact-repository-owner:
    required: false
    description: The owner of the GitHub App installation (defaults to current repository owner)

  artifact-repository:
    required: false
    description: The repository name joined that artifacts will be downloaded from

  artifact-actions-run-id:
    required: false
    description: |
      The id of the workflow run where the desired download artifact was uploaded from

runs:
  using: composite
  steps:

    # Only required when downloading artifacts from a different repository.
    # Generates a short-lived token via GitHub App to authenticate cross-repo access.
    - name: Create Github APP token
      uses: webitel/reusable-workflows/actions/create-github-app-token@create-github-app-token-v1
      id: app-token
      if: inputs.artifact-repository != ''
      with:
        app-id: ${{ inputs.github-app-id }}
        private-key: ${{ inputs.github-app-private-key }}
        owner: ${{ inputs.artifact-repository-owner }}
        repositories: ${{ inputs.artifact-repository }}

    # Downloads pre-built .deb packages from the specified workflow run.
    # When artifact-repository is empty, downloads from the current repo using GITHUB_TOKEN.
    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        name: build-packages-${{ inputs.arch }}
        repository: ${{ inputs.artifact-repository != '' && format('{0}/{1}', inputs.artifact-repository-owner, inputs.artifact-repository) || '' }}
        run-id: ${{ inputs.artifact-actions-run-id }}
        github-token: ${{ steps.app-token.outputs.token }}

    - name: Import GPG key
      id: import-gpg-key
      uses: crazy-max/ghaction-import-gpg@v7
      with:
        gpg_private_key: ${{ inputs.gpg-private-key }}
        passphrase: ${{ inputs.gpg-passphrase }}
        trust_level: 5

    - name: Publish packages
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.s3-secret-id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.s3-secret-key }}
        AWS_REGION: ${{ inputs.s3-bucket-region }}
        AWS_ENDPOINT_URL: ${{ inputs.s3-endpoint }}
        S3_FORCE_PATH_STYLE: ${{ inputs.s3-force-path-style }}
        S3_BUCKET_NAME: ${{ inputs.s3-bucket-name }}
        SOURCE_NAME: ${{ inputs.source }}
        ARCH: ${{ inputs.arch }}
        COMPONENT: ${{ inputs.component }}
        CODENAME: ${{ inputs.codename }}
        GPG_FINGERPRINT: ${{ steps.import-gpg-key.outputs.fingerprint }}

      run: |
        export GPG_TTY=$(tty)
        
        cmd=(
          deb-s3 upload "${SOURCE_NAME}"
          --visibility nil
          --preserve-versions 
          --arch "${ARCH}"
          --sign "${GPG_FINGERPRINT}"
          --gpg-options "--pinentry-mode loopback"
          --bucket "${S3_BUCKET_NAME}"
          --component "${COMPONENT}"
          --codename "${CODENAME}"
          --lock
        )

        [[ -n "${AWS_REGION}" ]]                     && cmd+=(--s3-region "${AWS_REGION}")
        [[ "${S3_FORCE_PATH_STYLE}" == "true" ]]     && cmd+=(--force-path-style)
        
        "${cmd[@]}"
