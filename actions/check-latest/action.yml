outputs:
  version:
    value: ${{ steps.check.outputs.version }}
    description: Latest valid release branch

runs:
  using: composite
  steps:
    - name: For each git ref
      id: check
      shell: bash
      run: |
        latest_branch=''
        latest_year=-1
        latest_month=-1

        while IFS= read -r ref; do
          branch="${ref#origin/}"

          if [[ ! "$branch" =~ ^v([0-9]{2})\.([0-9]{1,2})$ ]]; then
            continue
          fi

          year=$((10#${BASH_REMATCH[1]}))
          month=$((10#${BASH_REMATCH[2]}))

          if (( month < 1 || month > 12 )); then
            continue
          fi

          if (( year > latest_year || (year == latest_year && month > latest_month) )); then
            latest_year=$year
            latest_month=$month
            latest_branch=$branch
          fi
        done < <(git for-each-ref --format='%(refname:short)' refs/remotes/origin)

        echo "Latest release branch: $latest_branch"
        echo "version=$latest_branch" >> "$GITHUB_OUTPUT"
