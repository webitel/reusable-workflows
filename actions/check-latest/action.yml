outputs:
  version:
    value: ${{ steps.check.outputs.version }}
    description: Latest valid release branch

runs:
  using: composite
  steps:
    - name: For each git ref
      id: check
      shell: bash
      run: |
        latest_branch=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin \
          | sed 's|^origin/||' \
          | awk '
              function is_valid_release(branch, parts, month) {
                if (branch !~ /^v[0-9]{2}\.[0-9]{1,2}$/) {
                  return 0;
                }

                split(substr(branch, 2), parts, ".");
                month = parts[2] + 0;
                return month >= 1 && month <= 12;
              }

              {
                branch = $0;
                if (!is_valid_release(branch)) {
                  next;
                }

                split(substr(branch, 2), parts, ".");
                year = parts[1] + 0;
                month = parts[2] + 0;
                printf "%02d %02d %s\n", year, month, branch;
              }
            ' \
          | sort -k1,1nr -k2,2nr -k3,3r \
          | awk 'NR == 1 { print $3 }')

        echo "Latest release branch: $latest_branch"
        echo "version=$latest_branch" >> "$GITHUB_OUTPUT"
