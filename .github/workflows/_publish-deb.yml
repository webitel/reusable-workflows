name: Publish .deb package

on:
  workflow_call:
    secrets:
      DEB_S3_ACCESS_KEY_ID: { required: true }
      DEB_S3_SECRET_ACCESS_KEY: { required: true }
      REPO_SIGNING_KEY: { required: true }
      REPO_SIGNING_KEY_PASSPHRASE: { required: true }
      DELIVERY_BOT_APP_PEM: { required: false }

    inputs:
      repository-environment:
        type: string
        required: false
        default: ""
        description: Linked environment for upload build to repository (eg. acceptance, v25.04-releases, ...).

      deb-package-pattern:
        type: string
        required: true
        description: A path pattern to artifact, that should be uploaded to environments and installed.

      deb-component:
        type: string
        required: false
        default: dev
        description: Component of the APT repository.

      arch:
        type: string
        required: false
        default: amd64
        description: Package architecture (e.g., amd64, arm64).

      deb-codename:
        type: string
        required: true
        description: Nickname used for specific Debian releases.

      deb-s3-bucket-name:
        type: string
        required: true
        description: Name of the S3 bucket where the package will be uploaded.

      deb-s3-bucket-region:
        type: string
        required: false
        description: Region where the S3 bucket is located (e.g., us-east-1). Defaults to us-east-1 if not specified.

      deb-s3-endpoint:
        type: string
        required: false
        description: Custom endpoint URL for S3-compatible storage (e.g., MinIO, Ceph). If not set, defaults to AWS S3.

      deb-s3-force-path-style:
        type: boolean
        required: false
        default: false
        description: Force path style URLs instead of subdomain-based (required for most S3-compatible storages like MinIO).

      github-app-client-id:
        type: string
        required: false
        description: |
          Preferred GitHub App Client ID used to generate the installation token.
          This is required when downloading artifacts from a different repository or from a different workflow run.

      github-app-id:
        type: string
        required: false
        description: |
          Legacy GitHub App ID used to generate the installation token.
          Prefer github-app-client-id. This is required when downloading artifacts from a different repository or from a different workflow run.

      artifact-repository-owner:
        type: string
        required: false
        description: The owner of the GitHub App installation (defaults to current repository owner).

      artifact-repository:
        type: string
        required: false
        description: The repository name that artifacts will be downloaded from.

      artifact-actions-run-id:
        type: string
        required: false
        description: |
          The id of the workflow run where the desired download artifact was uploaded from.
          If artifact-github-token is specified, this is the run that artifacts will be downloaded from.

jobs:
  upload:
    name: Upload
    runs-on: [ arc-runner-set ]
    environment: ${{ inputs.repository-environment }}
    steps:
      - name: Publish build
        uses: webitel/reusable-workflows/actions/deb-s3-upload@deb-s3-upload-v2
        with:
          source: ${{ inputs.deb-package-pattern }}
          arch: ${{ inputs.arch }}
          component: ${{ inputs.deb-component }}
          codename: ${{ inputs.deb-codename }}
          s3-bucket-name: ${{ inputs.deb-s3-bucket-name }}
          s3-bucket-region: ${{ inputs.deb-s3-bucket-region }}
          s3-endpoint: ${{ inputs.deb-s3-endpoint }}
          s3-force-path-style: ${{ inputs.deb-s3-force-path-style }}
          s3-secret-id: ${{ secrets.DEB_S3_ACCESS_KEY_ID }}
          s3-secret-key: ${{ secrets.DEB_S3_SECRET_ACCESS_KEY }}
          gpg-private-key: ${{ secrets.REPO_SIGNING_KEY }}
          gpg-passphrase: ${{ secrets.REPO_SIGNING_KEY_PASSPHRASE }}
          github-app-client-id: ${{ inputs.github-app-client-id }}
          github-app-id: ${{ inputs.github-app-id }}
          github-app-private-key: ${{ secrets.DELIVERY_BOT_APP_PEM }}
          artifact-repository: ${{ inputs.artifact-repository }}
          artifact-repository-owner: ${{ inputs.artifact-repository-owner }}
          artifact-actions-run-id: ${{ inputs.artifact-actions-run-id }}
