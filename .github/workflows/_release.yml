name: Release

on:
  workflow_call:
    secrets:
      DELIVERY_BOT_APP_PEM: { required: false }

    inputs:
      tag:
        type: string
        required: true
        description: Tag name for the GitHub release.

      tag-target-commitish:
        type: string
        required: false
        default: ${{ github.sha }}

      make-latest:
        type: boolean
        required: false
        default: true
        description: Whether to mark this release as the latest.

      github-app-id:
        type: string
        required: false
        description: |
          Numeric ID of the GitHub App used to generate the installation token.
          This is required when downloading artifacts from a different repository.

      artifact-repository-owner:
        type: string
        required: false
        default: ${{ github.repository_owner }}
        description: The owner of the GitHub App installation (defaults to current repository owner).

      artifact-repository:
        type: string
        required: false
        description: The repository name that artifacts will be downloaded from.

      artifact-actions-run-id:
        type: string
        required: false
        description: |
          The id of the workflow run where the desired download artifact was uploaded from.

jobs:
  release:
    name: GitHub Release
    runs-on: [ arc-runner-set ]
    permissions: { contents: write }
    steps:
      - name: Create Github APP token
        uses: webitel/reusable-workflows/actions/create-github-app-token@create-github-app-token-v1
        id: app-token
        if: inputs.artifact-repository != ''
        with:
          app-id: ${{ inputs.github-app-id }}
          private-key: ${{ secrets.DELIVERY_BOT_APP_PEM }}
          owner: ${{ inputs.artifact-repository-owner }}
          repositories: ${{ inputs.artifact-repository }}

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: build-packages-*
          merge-multiple: true
          repository: ${{ inputs.artifact-repository != '' && format('{0}/{1}', inputs.artifact-repository-owner, inputs.artifact-repository) || '' }}
          run-id: ${{ inputs.artifact-actions-run-id }}
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ inputs.tag }}
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ inputs.tag-target-commitish }}
          make_latest: ${{ inputs.make-latest }}
          generate_release_notes: true
          draft: false
          files: dist/*
