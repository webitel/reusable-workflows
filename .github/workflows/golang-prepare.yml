name: Prepare

on:
  workflow_call:
    inputs:
      development-branch:
        type: string
        required: false
        default: main
        description: Name of the development branch

      triggered-branch:
        type: string
        required: false
        default: ${{ github.ref_name }}
        description: Name of the triggered branch

      only-dependencies:
        type: string
        required: false
        default: false

      generated-code-path:
        type: string
        required: false
        default: ''

      arch:
        type: string
        required: false
        default: amd64
        description: Comma-separated list of target architectures (e.g., "amd64" or "amd64, arm64").

      codename:
        type: string
        required: false
        default: bookworm
        description: Comma-separated list of Debian codenames (e.g., "bookworm" or "bookworm, jammy").

    outputs:
      version:
        value: ${{ jobs.version.outputs.version }}
        description: Extracted version

      build-timestamp:
        value: ${{ jobs.version.outputs.build-timestamp }}
        description: UTC build timestamp in ISO-8601 format

      arch-matrix:
        value: ${{ jobs.version.outputs.arch-matrix }}
        description: JSON array of target architectures

      codename-matrix:
        value: ${{ jobs.version.outputs.codename-matrix }}
        description: JSON array of Debian codenames

      changes:
        value: ${{ jobs.changes.outputs.changes }}
        description: JSON array of changed categories (e.g., ["go", "dependencies", "workflows"])

jobs:
  version:
    name: Version
    if: inputs.only-dependencies != 'true'
    uses: webitel/reusable-workflows/.github/workflows/_version.yml@v2
    with:
      development-branch: ${{ inputs.development-branch }}
      triggered-branch: ${{ inputs.triggered-branch }}
      arch: ${{ inputs.arch }}
      codename: ${{ inputs.codename }}

  changes:
    name: Detect changes
    runs-on: [ arc-runner-set ]
    outputs:
      changes: ${{ steps.build.outputs.changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            go:
              - '**/*.go'
            dependencies:
              - 'go.mod'
              - 'go.sum'
            workflows:
              - '.github/**'

      - name: Build changes array
        id: build
        env:
          GO: ${{ steps.filter.outputs.go }}
          DEPENDENCIES: ${{ steps.filter.outputs.dependencies }}
          WORKFLOWS: ${{ steps.filter.outputs.workflows }}

        run: |
          changes='[]'
          [[ "$GO" == "true" ]]           && changes=$(echo "$changes" | jq -c '. + ["go"]')
          [[ "$DEPENDENCIES" == "true" ]] && changes=$(echo "$changes" | jq -c '. + ["dependencies"]')
          [[ "$WORKFLOWS" == "true" ]]    && changes=$(echo "$changes" | jq -c '. + ["workflows"]')
          
          echo "changes=$changes" >> "$GITHUB_OUTPUT"
        

  dependencies:
    name: Dependencies
    runs-on: [ arc-backend-runner-set ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Download dependencies
        run: go mod download

  generated:
    name: Code
    runs-on: [ arc-backend-runner-set ]
    if: inputs.generated-code-path != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Generate code
        run: go generate ./...

      - name: Upload generated code
        uses: actions/upload-artifact@v7
        with:
          name: generated-code
          retention-days: 1
          compression-level: 9
          path: |
            dummy-file-to-keep-directory-structure.txt
            ${{ inputs.generated-code-path }}
