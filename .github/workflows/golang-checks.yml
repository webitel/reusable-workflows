name: Checks

on:
  workflow_call:
    inputs:
      generated-code:
        type: string
        required: false
        default: false
        description: Download generated code

      changes:
        type: string
        required: false
        default: '["go", "dependencies", "workflows"]'
        description: JSON array of changed categories (e.g., ["go", "dependencies", "workflows"])

jobs:
  lint:
    name: Lint code
    if: contains(fromJSON(inputs.changes), 'go') || contains(fromJSON(inputs.changes), 'dependencies')
    runs-on: [ arc-backend-runner-set ]
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Download generated code
        if: inputs.generated-code == 'true'
        uses: actions/download-artifact@v8
        with:
          name: generated-code

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          install-mode: none
          problem-matchers: true
          skip-cache: true

  govulncheck:
    name: Vulnerabilities
    if: contains(fromJSON(inputs.changes), 'dependencies')
    runs-on: [ arc-backend-runner-set ]
    permissions:
      security-events: write

      # only required for workflows in private repositories
      actions: read
      contents: read

    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Download generated code
        if: inputs.generated-code == 'true'
        uses: actions/download-artifact@v8
        with:
          name: generated-code

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck and save to file
        run: |
          govulncheck -C . -format sarif ./... > report.sarif
          
          # Workaround: govulncheck emits duplicate tags in SARIF rules, which upload-sarif rejects.
          jq '(.runs[].tool.driver.rules // [])[] |= (.properties.tags |= unique)' report.sarif > report.tmp && mv report.tmp report.sarif

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: report.sarif

  test:
    name: Unit testing
    if: contains(fromJSON(inputs.changes), 'go') || contains(fromJSON(inputs.changes), 'dependencies')
    runs-on: [ arc-backend-runner-set ]
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Download generated code
        if: inputs.generated-code == 'true'
        uses: actions/download-artifact@v8
        with:
          name: generated-code

      - name: Run all tests
        run: go test -short -v ./... | go run github.com/jstemmer/go-junit-report@latest -set-exit-code > report.xml

      - name: Test Summary
        if: always()
        uses: test-summary/action@v2.4
        with:
          paths: report.xml

  codeql-matrix:
    name: CodeQL matrix
    runs-on: [ arc-runner-set ]
    if: github.event.repository.private == false
    outputs:
      languages: ${{ steps.build.outputs.languages }}

    steps:
      - name: Build CodeQL language matrix from changes
        id: build
        env:
          CHANGES: ${{ inputs.changes }}

        run: |
          languages='[]'
          if echo "$CHANGES" | jq -e 'any(. == "go" or . == "dependencies")' > /dev/null 2>&1; then
            languages=$(echo "$languages" | jq -c '. + [{"language": "go", "build-mode": "autobuild"}]')
          fi
          
          if echo "$CHANGES" | jq -e 'any(. == "workflows")' > /dev/null 2>&1; then
            languages=$(echo "$languages" | jq -c '. + [{"language": "actions", "build-mode": "none"}]')
          fi
          
          echo "languages=$languages" >> "$GITHUB_OUTPUT"

  # Dynamic matrix: only includes languages whose files actually changed.
  analyze:
    name: CodeQL analyze (${{ matrix.language }})
    needs: [ codeql-matrix ]
    runs-on: [ arc-backend-runner-set ]
    if: github.event.repository.private == false && needs.codeql-matrix.outputs.languages != '[]'
    permissions:
      security-events: write

    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.codeql-matrix.outputs.languages) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Download generated code
        if: inputs.generated-code == 'true'
        uses: actions/download-artifact@v8
        with:
          name: generated-code

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # If you wish to specify custom queries, you can do so here or in a config file.
          # By default, queries listed here will override any specified in a config file.
          # Prefix the list here with "+" to use these queries and those in the config file.
          # queries: ./path/to/local/query, your-org/your-repo/queries@main

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"