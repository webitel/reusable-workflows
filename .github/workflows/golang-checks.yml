name: Checks

on:
  workflow_call:
    inputs:
      generated-code:
        type: string
        required: false
        default: false
        description: Download generated code

jobs:
  changes:
    name: Detect changes
    runs-on: [ arc-backend-runner-set ]
    permissions:
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      dependencies: ${{ steps.filter.outputs.dependencies }}
      codeql-matrix: ${{ steps.matrix.outputs.languages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            go:
              - '**/*.go'
            dependencies:
              - 'go.mod'
              - 'go.sum'
            workflows:
              - '.github/**'

      # Build a dynamic CodeQL matrix based on changed paths:
      # - Go source or dependency changes → analyze Go code
      # - Workflow/action file changes → analyze GitHub Actions
      - name: Build CodeQL matrix
        id: matrix
        run: |
          languages='[]'
          if [[ "${{ steps.filter.outputs.go }}" == "true" ]] || [[ "${{ steps.filter.outputs.dependencies }}" == "true" ]]; then
            languages=$(echo "$languages" | jq -c '. + [{"language": "go", "build-mode": "autobuild"}]')
          fi
          
          if [[ "${{ steps.filter.outputs.workflows }}" == "true" ]]; then
            languages=$(echo "$languages" | jq -c '. + [{"language": "actions", "build-mode": "none"}]')
          fi
          
          echo "languages=$languages" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint code
    needs: [ changes ]
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.dependencies == 'true'
    runs-on: [ arc-backend-runner-set ]
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Download generated code
        if: inputs.generated-code == 'true'
        uses: actions/download-artifact@v8
        with:
          name: generated-code

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          install-mode: none
          problem-matchers: true
          skip-cache: true

  govulncheck:
    name: Vulnerabilities
    needs: [ changes ]
    if: needs.changes.outputs.dependencies == 'true'
    runs-on: [ arc-backend-runner-set ]
    permissions:
      security-events: write

      # only required for workflows in private repositories
      actions: read
      contents: read

    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Download generated code
        if: inputs.generated-code == 'true'
        uses: actions/download-artifact@v8
        with:
          name: generated-code

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck and save to file
        run: |
          govulncheck -C . -format sarif ./... > report.sarif
          
          # Workaround: govulncheck emits duplicate tags in SARIF rules, which upload-sarif rejects.
          jq '(.runs[].tool.driver.rules // [])[] |= (.properties.tags |= unique)' report.sarif > report.tmp && mv report.tmp report.sarif

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: report.sarif

  test:
    name: Unit testing
    needs: [ changes ]
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.dependencies == 'true'
    runs-on: [ arc-backend-runner-set ]
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Download generated code
        if: inputs.generated-code == 'true'
        uses: actions/download-artifact@v8
        with:
          name: generated-code

      - name: Run all tests
        run: go test -short -v ./... | go run github.com/jstemmer/go-junit-report@latest -set-exit-code > report.xml

      - name: Test Summary
        if: always()
        uses: test-summary/action@v2.4
        with:
          paths: report.xml

  # Dynamic matrix: only includes languages whose files actually changed.
  analyze:
    name: CodeQL analyze (${{ matrix.language }})
    needs: [ changes ]
    runs-on: [ arc-backend-runner-set ]
    if: github.event.repository.private == false && needs.changes.outputs.codeql-matrix != '[]'
    permissions:
      security-events: write

    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.codeql-matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Download generated code
        if: inputs.generated-code == 'true'
        uses: actions/download-artifact@v8
        with:
          name: generated-code

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # If you wish to specify custom queries, you can do so here or in a config file.
          # By default, queries listed here will override any specified in a config file.
          # Prefix the list here with "+" to use these queries and those in the config file.
          # queries: ./path/to/local/query, your-org/your-repo/queries@main

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"