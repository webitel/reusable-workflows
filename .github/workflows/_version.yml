name: Version

on:
  workflow_call:
    inputs:
      development-branch:
        type: string
        required: false
        default: main
        description: Name of the development branch

      triggered-branch:
        type: string
        required: false
        default: ${{ github.ref_name }}
        description: Name of the triggered branch

      arch:
        type: string
        required: false
        default: amd64
        description: Comma-separated list of target architectures (e.g., "amd64" or "amd64, arm64").

      codename:
        type: string
        required: false
        default: bookworm
        description: Comma-separated list of Debian codenames (e.g., "bookworm" or "bookworm, jammy").

    outputs:
      version:
        value: ${{ jobs.parse.outputs.version }}
        description: Extracted version

      build-timestamp:
        value: ${{ jobs.parse.outputs.build-timestamp }}
        description: UTC build timestamp in ISO-8601 format

      arch-matrix:
        value: ${{ jobs.parse.outputs.arch }}
        description: JSON array of target architectures

      codename-matrix:
        value: ${{ jobs.parse.outputs.codename }}
        description: JSON array of Debian codenames

jobs:
  parse:
    name: Parse
    runs-on: [ arc-runner-set ]
    outputs:
      version: ${{ steps.version.outputs.version }}
      build-timestamp: ${{ steps.metadata.outputs.build-timestamp }}
      arch: ${{ steps.matrix.outputs.arch }}
      codename: ${{ steps.matrix.outputs.codename }}

    steps:
      - name: Generate build metadata
        id: metadata
        shell: bash
        run: echo "build-timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Parse build matrix
        id: matrix
        shell: bash
        env:
          ARCH: ${{ inputs.arch }}
          CODENAME: ${{ inputs.codename }}

        run: |
          to_json() { echo "$1" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -v '^$' | jq -Rc . | jq -sc .; }
          echo "arch=$(to_json "$ARCH")" >> "$GITHUB_OUTPUT"
          echo "codename=$(to_json "$CODENAME")" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: For each git ref find the latest release branch
        id: latest-release-branch
        uses: webitel/reusable-workflows/actions/check-latest@check-latest-v1.0.1

      - name: Get version
        id: version
        uses: actions/github-script@v8
        env:
          DEVELOPMENT_BRANCH: ${{ inputs.development-branch }}
          TRIGGERED_BRANCH: ${{ inputs.triggered-branch }}
          LATEST_RELEASE_BRANCH: ${{ steps.latest-release-branch.outputs.version }}

        with:
          script: |
            const developmentBranch = process.env.DEVELOPMENT_BRANCH;
            const triggeredBranch = process.env.TRIGGERED_BRANCH;
            const latestReleaseBranch = process.env.LATEST_RELEASE_BRANCH;
            
            console.log(`📋 Development branch: ${developmentBranch}`);
            console.log(`🔀 Triggered branch: ${triggeredBranch}`);
            console.log(`🏷️ Latest release branch: ${latestReleaseBranch || 'none'}`);
            
            function parseVersion(versionString) {
              if (!versionString) return null;
            
              const cleanVersion = versionString.replace(/^v/, '');
              const parts = cleanVersion.split('.');
              if (parts.length >= 2) {
                const year = parts[0];
                const month = parts[1].replace(/^0+/, '') || '0';
                return `${year}.${month}`;
              }
            
              return cleanVersion;
            }
            
            function getCurrentDateVersion() {
              const now = new Date();
              const year = now.getFullYear().toString().slice(-2);
              const month = (now.getMonth() + 1).toString();
              return `${year}.${month}`;
            }
            
            let version;
            
            if (triggeredBranch === developmentBranch) {
              console.log('🔨 Processing development build');
            
              if (latestReleaseBranch) {
                console.log(`📦 Using version from latest release branch: ${latestReleaseBranch}`);
                version = parseVersion(latestReleaseBranch);
              } else {
                console.log('📅 No release branch found, using date-based version');
                version = getCurrentDateVersion();
              }
            } else {
              console.log('🚀 Processing release build');
              console.log(`📦 Using version from triggered branch: ${triggeredBranch}`);
              version = parseVersion(triggeredBranch);
            }
            
            console.log(`✨ Final version: ${version}`);
            core.setOutput('version', version);
